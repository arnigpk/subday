<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#f5f0e8" />
    <link rel="icon" href="/favicon.jpg" type="image/jpeg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-title" content="subday" />
    <title>subday — specialty coffee & HoReCa subscriptions</title>

    <!-- Фон с первого кадра = фон прелоадера (#FAF9F6). Нужно, чтобы при мгновенном
         скрытии нативного splash не мелькал белый экран до загрузки CSS. -->
    <style>html,body{background-color:#FAF9F6;margin:0;}</style>
    <meta name="description" content="subday — specialty coffee & HoReCa subscriptions. Grab your drinks fast and save more." />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />

    <!-- Telegram WebApp SDK — load sync so mini app init is instant -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
