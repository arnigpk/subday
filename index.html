<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#f5f0e8" />
    <link rel="icon" href="/favicon.jpg" type="image/jpeg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-title" content="subday" />
    <title>subday — specialty coffee & HoReCa subscriptions</title>
    <meta name="description" content="subday — specialty coffee & HoReCa subscriptions. Grab your drinks fast and save more." />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />

    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/src/assets/preloader.gif" />
    <link rel="preload" as="image" href="/src/assets/logo.png" />

    <!-- Telegram WebApp SDK — defer to not block rendering -->
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>

    <style>
      #inline-preloader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #FAF9F6;
      }
      #inline-preloader img { width: 100%; height: 100%; object-fit: contain; }
      #inline-preloader.hidden { display: none; }
    </style>
  </head>

  <body>
    <!-- Instant preloader before React boots -->
    <div id="inline-preloader">
      <img src="/src/assets/preloader.gif" alt="Loading" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
